<div class="container my-5">
  <div class="create-card mx-auto p-4 rounded-3 shadow border bg-white">
    <div class="mb-4">
      <h2 class="fw-bold mb-2">Create Event</h2>
      <p class="text-muted mb-0">Fill in the event details. The form is converted to JSON and sent to the backend.</p>
    </div>

    @if (errorMessage) {
      <div class="alert alert-danger">{{ errorMessage }}</div>
    }

    @if (successMessage) {
      <div class="alert alert-success">{{ successMessage }}</div>
    }

    <form class="row g-3" (ngSubmit)="onSubmit()" #createEventForm="ngForm">
      <div class="col-12">
        <label class="form-label">Title</label>
        <input
          class="form-control"
          name="title"
          [(ngModel)]="eventData.title"
          (ngModelChange)="updatePreview()"
          required
        />
      </div>

      <div class="col-12">
        <label class="form-label">Description</label>
        <textarea
          class="form-control"
          name="description"
          rows="5"
          [(ngModel)]="eventData.description"
          (ngModelChange)="updatePreview()"
          required
        ></textarea>
      </div>

      <div class="col-md-6">
        <label class="form-label">Date</label>
        <input
          class="form-control"
          type="date"
          name="date"
          [(ngModel)]="eventData.date"
          (ngModelChange)="updatePreview()"
          required
        />
      </div>

      <div class="col-md-6">
        <label class="form-label">Time</label>
        <input
          class="form-control"
          type="time"
          name="time"
          [(ngModel)]="eventData.time"
          (ngModelChange)="updatePreview()"
          required
        />
      </div>

      <div class="col-md-8">
        <label class="form-label">Location</label>
        <select
          class="form-select"
          name="location"
          [(ngModel)]="eventData.location"
          (ngModelChange)="updatePreview()"
          required
        >
          <option value="" disabled>Select city</option>
          @for (location of locations; track location) {
            <option [value]="location">{{ location }}</option>
          }
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">Price</label>
        <input
          class="form-control"
          type="number"
          name="price"
          min="0"
          step="0.01"
          [(ngModel)]="eventData.price"
          (ngModelChange)="updatePreview()"
        />
      </div>

      <div class="col-12">
        <label class="form-label">Select Tags</label>
        <div class="d-flex flex-wrap gap-2">
          @for (tag of tags; track tag.id) {
            <button
              type="button"
              (click)="toggleTag(tag)"
              [class]="tag.selected ? 'btn btn-success rounded-pill' : 'btn btn-outline-secondary rounded-pill'"
            >
              {{ tag.name }}
            </button>
          }
        </div>
      </div>

      <div class="col-12">
        <label class="form-label">JSON Preview</label>
        <pre class="bg-light border rounded-3 p-3 small mb-0">{{ jsonPreview }}</pre>
      </div>

      <div class="col-12 d-flex gap-2 justify-content-end">
        <a class="btn btn-outline-secondary" routerLink="/">Cancel</a>
        <button class="btn btn-success px-4" type="submit" [disabled]="isSubmitting || createEventForm.invalid">
          {{ isSubmitting ? 'Creating...' : 'Create Event' }}
        </button>
      </div>
    </form>
  </div>
</div>
