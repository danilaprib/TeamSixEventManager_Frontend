<div
  class="container-fluid align-items-center sticky-top justify-content-between d-flex border border-bottom-5 p-5 bg-white text-white"
  style="height: 80px"
>
  <a routerLink="/">
    <img
      class="logo"
      src="./assets/icons/logo.svg"
      alt="EVENTS_MANAGER"
      style="width: 70px; height: 70px"
    />
  </a>

  <nav class="navbar navbar-expand align-items-center justify-content-center">
    <ul class="navbar-nav">
      <li class="nav-item-xxl">
        <a class="nav-link fs-3 text-dark" routerLink="">EVENTS</a>
      </li>
      <li class="nav-item-xxl">
        <a class="nav-link fs-3 text-dark" routerLink="/create-event">CREATE</a>
      </li>
      <li class="nav-item-xxl">
        <a class="nav-link fs-3 text-dark" routerLink="/about">ABOUT</a>
      </li>
    </ul>
  </nav>

  <div class="d-flex gap-4 align-items-center">
    <a [routerLink]="authService.isLoggedIn() ? '/user-page' : '/login'" class="rounded-circle bg-light p-2 hover-green">
      <img
        src="./assets/icons/user.svg"
        style="width: 25px; height: 25px"
        alt="User Profile"
      />
    </a>

    @if (!authService.isLoggedIn()) {
      <a
        class="link text-dark hover-green p-2 rounded-3 text-decoration-none fs-4"
        routerLink="/login"
      >
        LOGIN
      </a>
      <a
        class="link text-dark hover-green p-2 rounded-3 text-decoration-none fs-4"
        routerLink="/signup"
      >
        SIGN UP
      </a>
    } @else {
      <button 
        class="btn btn-link link text-dark hover-green p-2 rounded-3 text-decoration-none fs-4 border-0 m-0 bg-transparent" 
        (click)="logout()"
      >
        LOGOUT
      </button>
    }
  </div>
</div>
