<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-11 col-md-6 col-lg-4">
      <div class="card shadow border-0 p-4 rounded-3">
        <h1 class="text-center mb-4">Sign Up</h1>

        <form>

          <div class="mb-3">
            <label class="form-label fw-bold">Username</label>
            <input type="text" class="form-control" placeholder="Enter your username" />
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <input type="email" class="form-control" placeholder="Enter your email" />
          </div>
          
          <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <div class="input-group">
              <input type="password" class="form-control" placeholder="Enter your password" />
              <button class="btn btn-outline-secondary"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label fw-bold">Confirm Password</label>
            <div class="input-group">
              <input type="password" class="form-control" placeholder="Confirm your password" />
              <button class="btn btn-outline-secondary"><i class="bi bi-eye"></i></button>
            </div>
          </div>

          <button class="btn btn-success w-100 py-2 mb-3">Sign Up</button>

          <div class="text-center small ">
            <p>
              Already have an account? <a href="#" class="text-decoration-none fw-bold">Log in</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
